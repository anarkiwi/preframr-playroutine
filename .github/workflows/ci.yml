name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[test]"
      - name: black
        run: black --check preframr_playroutine tests
      - name: pylint
        run: pylint preframr_playroutine
      - name: Unit tests (analysis layer)
        run: pytest -q

  docker-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t preframr-playroutine:ci .
      - name: Run full test suite (incl. end-to-end oracle + HVSC real tunes)
        # The container has python + the package + the sidtrace binary. Give it
        # network + the HVSC base URL so tests/test_hvsc.py downloads and traces
        # the real tunes from tests/fixtures/tunes.json.
        run: >
          docker run --rm
          -e HVSC_BASE_URL=https://hvsc.c64.org/download/C64Music
          preframr-playroutine:ci -q
